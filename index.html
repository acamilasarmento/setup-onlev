<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Setup Onlev</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-950 flex items-center justify-center p-6">

  <div class="w-full max-w-2xl">
    <!-- Card -->
    <div class="bg-gray-900 rounded-2xl p-8 border border-gray-800">
      <h1 class="text-3xl font-bold text-white mb-6">Setup Onlev</h1>

      <!-- Email -->
      <div class="mb-4">
        <label class="block text-sm text-gray-300 mb-1">Seu e-mail</label>
        <input id="email" type="email"
          placeholder="seu email para smtp (obrigatório email real)"
          class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 text-sm focus:outline-none focus:border-violet-500 transition" />
      </div>

      <!-- Row 1 -->
      <div class="grid grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-sm text-gray-300 mb-1">Domínio N8N Editor</label>
          <input id="n8n" type="text" placeholder="ex.: n8n.seudominio.com"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 text-sm focus:outline-none focus:border-violet-500 transition" />
        </div>
        <div>
          <label class="block text-sm text-gray-300 mb-1">Domínio para Portainer</label>
          <input id="portainer" type="text" placeholder="ex.: portainer.seudominio.com"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 text-sm focus:outline-none focus:border-violet-500 transition" />
        </div>
      </div>

      <!-- Row 2 -->
      <div class="grid grid-cols-2 gap-4 mb-6">
        <div>
          <label class="block text-sm text-gray-300 mb-1">Seu domínio para webhook do n8n</label>
          <input id="webhook" type="text" placeholder="ex.: webhooks.seudominio.com"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 text-sm focus:outline-none focus:border-violet-500 transition" />
        </div>
        <div>
          <label class="block text-sm text-gray-300 mb-1">Domínio para Evolution (API do WhatsApp)</label>
          <input id="evolution" type="text" placeholder="ex.: evolution.seudominio.com"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 text-sm focus:outline-none focus:border-violet-500 transition" />
        </div>
      </div>

      <hr class="border-gray-700 mb-6" />

      <div class="flex items-center justify-between">
        <button onclick="limpar()"
          class="bg-gray-800 hover:bg-gray-700 text-gray-300 font-medium px-5 py-2.5 rounded-lg text-sm transition">
          Limpar
        </button>
        <button onclick="gerar()"
          class="bg-yellow-400 hover:bg-yellow-300 text-gray-900 font-bold px-6 py-2.5 rounded-lg text-sm transition">
          Gerar
        </button>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-6 z-50">
    <div class="bg-gray-900 rounded-2xl p-6 border border-gray-800 w-full max-w-2xl">

      <div class="flex items-center justify-between mb-4">
        <h2 class="text-white font-bold text-lg">Comando gerado</h2>
        <button onclick="fecharModal()" class="text-gray-500 hover:text-white text-xl leading-none transition">✕</button>
      </div>

      <p class="text-gray-400 text-sm mb-4">Pronto! Agora cole este comando no terminal da sua VPS.</p>

      <pre id="command-box"
        class="bg-gray-800 border border-yellow-500/40 rounded-lg p-4 text-sm text-white font-mono overflow-x-auto whitespace-pre leading-relaxed mb-6"></pre>

      <div class="flex justify-end gap-3">
        <button onclick="copiar()" id="copy-btn"
          class="bg-gray-700 hover:bg-gray-600 text-white font-medium px-5 py-2.5 rounded-lg text-sm transition">
          Copiar
        </button>
        <button onclick="fecharModal()"
          class="bg-yellow-400 hover:bg-yellow-300 text-gray-900 font-bold px-5 py-2.5 rounded-lg text-sm transition">
          Ok
        </button>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://raw.githubusercontent.com/acamilasarmento/setup-onlev/refs/heads/main/docs";

    function gerar() {
      const email     = document.getElementById("email").value.trim();
      const n8n       = document.getElementById("n8n").value.trim();
      const portainer = document.getElementById("portainer").value.trim();
      const webhook   = document.getElementById("webhook").value.trim();
      const evolution = document.getElementById("evolution").value.trim();

      if (!email || !n8n || !portainer || !webhook || !evolution) {
        alert("Preencha todos os campos antes de gerar.");
        return;
      }

      const cmd =
        `bash <(curl -fsSL ${SCRIPT_URL}) \\\n` +
        `  "${email}" \\\n` +
        `  "${n8n}" \\\n` +
        `  "${portainer}" \\\n` +
        `  "${webhook}" \\\n` +
        `  "${evolution}"`;

      document.getElementById("command-box").textContent = cmd;
      document.getElementById("modal").classList.remove("hidden");
      document.getElementById("copy-btn").textContent = "Copiar";
    }

    function fecharModal() {
      document.getElementById("modal").classList.add("hidden");
    }

    function copiar() {
      const text = document.getElementById("command-box").textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById("copy-btn");
        btn.textContent = "✓ Copiado!";
        setTimeout(() => btn.textContent = "Copiar", 2000);
      });
    }

    function limpar() {
      ["email","n8n","portainer","webhook","evolution"].forEach(id => {
        document.getElementById(id).value = "";
      });
    }
  </script>
</body>
</html>
